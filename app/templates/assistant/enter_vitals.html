{% extends 'shared/base.html' %}
{% block title %}Nhập Sinh hiệu — {{ appt.patient.full_name }}{% endblock %}
{% block page_title %}Đo sinh hiệu đầu vào{% endblock %}

{% block content %}
<div class="card" style="max-width:700px">
  <div class="card-header" style="justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px">
      <i class="fas fa-heartbeat" style="color:var(--danger)"></i>
      <span class="card-title">Nhập Sinh hiệu — {{ appt.patient.full_name }}</span>
    </div>
    <span class="badge badge-muted">Tuổi: {{ appt.patient.age }}</span>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Nhiệt độ (°C)</label>
          <input type="number" step="0.1" name="temperature" value="{{ vital.temperature if vital else '' }}" placeholder="VD: 37.0"/>
        </div>
        <div class="form-group">
          <label>Huyết áp (mmHg)</label>
          <input type="text" name="blood_pressure" value="{{ vital.blood_pressure if vital else '' }}" placeholder="VD: 120/80"/>
        </div>
        <div class="form-group">
          <label>Nhịp tim (lần/phút)</label>
          <input type="number" name="heart_rate" value="{{ vital.heart_rate if vital else '' }}" placeholder="VD: 80"/>
        </div>
        <div class="form-group">
          <label>Nhịp thở (lần/phút)</label>
          <input type="number" name="respiratory_rate" value="{{ vital.respiratory_rate if vital else '' }}" placeholder="VD: 18"/>
        </div>
        <div class="form-group">
          <label>Cân nặng (kg)</label>
          <input type="number" step="0.1" name="weight" value="{{ vital.weight if vital else '' }}" placeholder="VD: 65.5"/>
        </div>
        <div class="form-group">
          <label>Chiều cao (cm)</label>
          <input type="number" step="0.1" name="height" value="{{ vital.height if vital else '' }}" placeholder="VD: 170"/>
        </div>
        <div class="form-group">
          <label>Nồng độ oxy máu SpO2 (%)</label>
          <input type="number" step="0.1" name="spo2" value="{{ vital.spo2 if vital else '' }}" placeholder="VD: 98"/>
        </div>
        <div class="form-group full">
          <label>Ghi chú của Trợ lý</label>
          <textarea name="notes" placeholder="Bệnh nhân than mệt mỏi, da xanh xao...">{{ vital.notes if vital else '' }}</textarea>
        </div>
      </div>

      <div class="divider"></div>
      <div style="display:flex;justify-content:flex-end;gap:12px">
        <a href="{{ url_for('assistant.dashboard') }}" class="btn btn-outline">Hủy</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu sinh hiệu</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
