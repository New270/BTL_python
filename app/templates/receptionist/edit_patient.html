{% extends 'shared/base.html' %}
{% block title %}Sửa hồ sơ — {{ patient.full_name }}{% endblock %}
{% block page_title %}Sửa thông tin Bệnh nhân{% endblock %}

{% block content %}
<div class="card" style="max-width:900px">
  <div class="card-header" style="justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px">
      <i class="fas fa-user-edit" style="color:var(--primary)"></i>
      <span class="card-title">Cập nhật hồ sơ</span>
    </div>
    <span class="patient-code-display">{{ patient.patient_code }}</span>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group full">
          <label>Họ và tên <span class="req">*</span></label>
          <input type="text" name="full_name" value="{{ patient.full_name }}" required/>
        </div>
        <div class="form-group">
          <label>Ngày sinh</label>
          <input type="date" name="dob" value="{{ patient.dob.strftime('%Y-%m-%d') if patient.dob else '' }}"/>
        </div>
        <div class="form-group">
          <label>Giới tính</label>
          <select name="gender">
            <option value="male" {% if patient.gender == 'male' %}selected{% endif %}>Nam</option>
            <option value="female" {% if patient.gender == 'female' %}selected{% endif %}>Nữ</option>
            <option value="other" {% if patient.gender == 'other' %}selected{% endif %}>Khác</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nhóm máu</label>
          <select name="blood_type">
            <option value="unknown" {% if patient.blood_type == 'unknown' %}selected{% endif %}>Chưa rõ</option>
            {% for bt in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
            <option value="{{ bt }}" {% if patient.blood_type == bt %}selected{% endif %}>{{ bt }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="tel" name="phone" value="{{ patient.phone or '' }}"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" value="{{ patient.email or '' }}"/>
        </div>
        <div class="form-group">
          <label>CCCD / CMND</label>
          <input type="text" name="national_id" value="{{ patient.national_id or '' }}"/>
        </div>
        <div class="form-group">
          <label>Số BHYT</label>
          <input type="text" name="insurance_number" value="{{ patient.insurance_number or '' }}"/>
        </div>
        <div class="form-group full">
          <label>Địa chỉ</label>
          <input type="text" name="address" value="{{ patient.address or '' }}"/>
        </div>
      </div>

      <div class="divider"></div>
      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:16px;color:var(--primary)">Liên hệ khẩn cấp & Tiền sử bệnh</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Người liên hệ</label>
          <input type="text" name="emergency_contact_name" value="{{ patient.emergency_contact_name or '' }}"/>
        </div>
        <div class="form-group">
          <label>SĐT khẩn cấp</label>
          <input type="tel" name="emergency_contact_phone" value="{{ patient.emergency_contact_phone or '' }}"/>
        </div>
        <div class="form-group">
          <label>Quan hệ</label>
          <input type="text" name="emergency_contact_rel" value="{{ patient.emergency_contact_rel or '' }}"/>
        </div>
        <div class="form-group full">
          <label>Dị ứng (Thuốc/Thức ăn)</label>
          <textarea name="allergy_notes">{{ patient.allergy_notes or '' }}</textarea>
        </div>
        <div class="form-group full">
          <label>Bệnh mãn tính</label>
          <textarea name="chronic_diseases">{{ patient.chronic_diseases or '' }}</textarea>
        </div>
      </div>

      <div class="divider"></div>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <a href="{{ url_for('receptionist.patient_detail', patient_id=patient.id) }}" class="btn btn-outline">Hủy</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Cập nhật</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
