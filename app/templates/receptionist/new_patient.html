{% extends 'shared/base.html' %}
{% block title %}Tiếp nhận Bệnh nhân mới — MediCare{% endblock %}
{% block page_title %}Tiếp nhận Bệnh nhân mới{% endblock %}

{% block content %}
<div style="max-width:900px">
  <div class="card">
    <div class="card-header">
      <i class="fas fa-user-plus" style="color:var(--primary)"></i>
      <span class="card-title">Thông tin Bệnh nhân</span>
    </div>
    <div class="card-body">
      <form method="POST">
        <h3 style="font-size:.95rem;font-weight:700;margin-bottom:16px;color:var(--primary)"><i class="fas fa-id-card"></i> Thông tin cơ bản</h3>
        <div class="form-grid">
          <div class="form-group full">
            <label>Họ và tên <span class="req">*</span></label>
            <input type="text" name="full_name" required placeholder="Nguyễn Văn A"/>
          </div>
          <div class="form-group">
            <label>Ngày sinh</label>
            <input type="date" name="dob"/>
          </div>
          <div class="form-group">
            <label>Giới tính</label>
            <select name="gender">
              <option value="male">Nam</option>
              <option value="female">Nữ</option>
              <option value="other">Khác</option>
            </select>
          </div>
          <div class="form-group">
            <label>Nhóm máu</label>
            <select name="blood_type">
              <option value="unknown">Chưa rõ</option>
              {% for bt in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}<option value="{{ bt }}">{{ bt }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group"><label>Số điện thoại</label><input type="tel" name="phone"/></div>
        </div>

        <div class="divider"></div>

        <div class="form-grid">
          <div class="form-group"><label>CCCD / CMND</label><input type="text" name="national_id"/></div>
          <div class="form-group"><label>Số BHYT</label><input type="text" name="insurance_number"/></div>
          <div class="form-group full"><label>Địa chỉ</label><input type="text" name="address"/></div>
        </div>

        <div class="divider"></div>

        <h3 style="font-size:.95rem;font-weight:700;margin-bottom:16px;color:var(--primary)"><i class="fas fa-user-lock"></i> Cấp tài khoản truy cập (Tùy chọn)</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" placeholder="VD: nguyenvana">
          </div>
          <div class="form-group">
            <label>Mật khẩu tạm thời</label>
            <input type="password" name="password" placeholder="******">
          </div>
        </div>

        <div class="divider"></div>

        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
          <a href="{{ url_for('receptionist.patients') }}" class="btn btn-outline"><i class="fas fa-times"></i> Hủy</a>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu và cấp mã bệnh nhân</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
