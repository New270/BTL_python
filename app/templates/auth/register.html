{% extends 'shared/base.html' %} 
{% block content %}
<div class="card" style="max-width: 450px; margin: 50px auto;">
    <div class="card-header"><span class="card-title">Đăng ký Bệnh nhân mới</span></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group mb-4">
                <label>Họ và tên</label>
                <input type="text" name="full_name" required placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group mb-4">
                <label>Số điện thoại</label>
                <input type="text" name="phone" required placeholder="09xxxxxxx">
            </div>
            <div class="form-group mb-4">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group mb-4">
                <label>Mật khẩu</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Đăng ký ngay</button>
        </form>
        <p style="margin-top: 15px; text-align: center; font-size: 0.9rem;">
            Đã có tài khoản? <a href="{{ url_for('auth.login') }}">Đăng nhập</a>
        </p>
    </div>
</div>
{% endblock %}
